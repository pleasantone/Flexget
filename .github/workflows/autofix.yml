name: autofix.ci
on:
  push:
    branches: [develop]
    paths:
      - .github/workflows/autofix.yml
      - pyproject.toml
      - uv.lock
  pull_request:
    paths:
      - .github/workflows/autofix.yml
      - pyproject.toml
      - uv.lock
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref || github.run_id }}
  cancel-in-progress: true
env:
  UV_VERSION: 0.8.13 # renovate: datasource=pypi depName=uv
jobs:
  uv-lock:
    name: autofix uv.lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b # v6
        with:
          version: ${{ env.UV_VERSION }}
      - name: Run uv lock
        run: uv lock
      - name: Autofix
        uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27 # v1
