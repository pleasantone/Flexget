        summary=\"The Avatar Collection tells the story of the world of Pandora, inhabited
        by the indigenous humanoids, the Na&apos;vi. The main protagonist, Jake Sully
        (Sam Worthington), is sent to Pandora as an avatar\u2014a hybrid of human
        and Na&apos;vi. During his mission, Jake discovers the beauty and complexity
        of the Na&apos;vi world and forms a deep connection with the planet&apos;s
        inhabitants. The collection focuses on the conflict between humans and the
        Na&apos;vi and the struggle to save the world of Pandora.\" thumb=\"https://image.tmdb.org/t/p/original/3C5brXxnBxfkeKWwA1Fh4xvy4wr.jpg\"
